{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.minio.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.minio.name }}
    app.kubernetes.io/component: minio
    {{- include "zeroday.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.minio.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.minio.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.minio.name }}
    spec:
      containers:
        - name: minio
          image: {{ include "zeroday.imageRef" (list . .Values.minio.image.repository .Values.minio.image.tag) }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :9001
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: {{ include "zeroday.secretName" . }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.minio.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.minio.name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
