{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.postgresql.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.postgresql.name }}
    app.kubernetes.io/component: postgres
    {{- include "zeroday.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgresql.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.postgresql.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.postgresql.name }}
    spec:
      containers:
        - name: postgres
          image: {{ include "zeroday.imageRef" (list . .Values.postgresql.image.repository .Values.postgresql.image.tag) }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ include "zeroday.secretName" . }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.postgresql.name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
