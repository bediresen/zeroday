# MinIO — imaj: bediresen/minio (S3 API :9000, konsol :9001)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zeroday-minio-data
  labels:
    app.kubernetes.io/name: zeroday-minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zeroday-minio
  labels:
    app.kubernetes.io/name: zeroday-minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zeroday-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroday-minio
  labels:
    app.kubernetes.io/name: zeroday-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zeroday-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeroday-minio
    spec:
      containers:
        - name: minio
          image: docker.io/bediresen/minio:latest
          imagePullPolicy: Always
          args:
            - server
            - /data
            - --console-address
            - :9001
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: zeroday-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zeroday-minio-data
