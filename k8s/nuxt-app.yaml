# Nuxt uygulaması — imaj: bediresen/zeroday-app
# DB: zeroday-postgres:5432  |  MinIO: http://zeroday-minio:9000
# Uygula (sıra): secrets → postgres → minio → nuxt-app → ingress
# kubectl apply -f k8s/secrets.yaml -f k8s/postgres.yaml -f k8s/minio.yaml -f k8s/nuxt-app.yaml -f k8s/ingress.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: zeroday-app
  labels:
    app.kubernetes.io/name: zeroday-app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zeroday-app
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroday-app
  labels:
    app.kubernetes.io/name: zeroday-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zeroday-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeroday-app
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z zeroday-postgres 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z zeroday-minio 9000; do echo waiting for minio; sleep 2; done
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: docker.io/bediresen/zeroday-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: NITRO_HOST
              value: "0.0.0.0"
            - name: NITRO_PORT
              value: "3000"
            - name: NUXT_CVE_DIALECT
              value: postgres
            - name: NUXT_CVE_HOST
              value: zeroday-postgres
            - name: NUXT_CVE_PORT
              value: "5432"
            - name: NUXT_CVE_USER
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: POSTGRES_USER
            - name: NUXT_CVE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: POSTGRES_PASSWORD
            - name: NUXT_CVE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: POSTGRES_DB
            - name: NUXT_MINIO_ENDPOINT
              value: http://zeroday-minio:9000
            - name: NUXT_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: MINIO_ROOT_USER
            - name: NUXT_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: NUXT_MINIO_BUCKET
              value: cve-reports
            - name: NUXT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: NUXT_SESSION_SECRET
            - name: NUXT_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: NUXT_OPENAI_API_KEY
            - name: NUXT_OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: NUXT_OPENAI_MODEL
            - name: NUXT_OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: zeroday-secrets
                  key: NUXT_OPENAI_BASE_URL
            - name: NUXT_SESSION_COOKIE_SECURE
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 25
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
