# zeroday-app Deployment: NUXT_OPENAI_* ve diğer anahtarlar buradan env ile okunur.
# Gerçek anahtarları repoya commit etmeyin; SealedSecret / harici secret kullanın.
apiVersion: v1
kind: Secret
metadata:
  name: zeroday-secrets
  labels:
    app.kubernetes.io/name: zeroday
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "zeroday"
  MINIO_ROOT_USER: "user"
  MINIO_ROOT_PASSWORD: "password"
  NUXT_SESSION_SECRET: ""
  NUXT_OPENAI_API_KEY: ""
  NUXT_OPENAI_MODEL: "gpt-5-nano"
  NUXT_OPENAI_BASE_URL: "https://api.openai.com/v1"
  NUXT_AUTH_ALLOW_REGISTER: "true"